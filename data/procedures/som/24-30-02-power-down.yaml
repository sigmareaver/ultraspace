schema: procedure/1
id: som-24-30-02
title: "Electrical Power Down"
manual_ref: "SOM 24-30-02"
ship: core:tb-1
steps:
  - step: 1
    scl: "eps cb.a1 open"
    note: "Shed loads before opening sources (24-30-02 note)."
  - step: 2
    scl: "eps bus.a.tie open"
  - step: 3
    scl: "eps bus.a.precharge stop"
  - step: 4
    scl: "eps cb.e1 open"
  - step: 5
    scl: "eps bat.1.contactor open"
  - step: 6
    scl: "eps bat.1 read"
    expect_telemetry: mt.bat.1.i
    expect_max: 0.5
    within_s: 2.0
    note: "WARNING: buses retain capacitor charge after this step."
