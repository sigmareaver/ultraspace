name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --locked
      - run: make lint
      - run: make types
      - run: make test
      # Determinism canary: selftest digest must be stable (also asserted in pytest).
      - run: make selftest

  # Reserved future stages, per docs/engineering/testing.md:
  #   content-validate (M1) · conformance (M1) · perf-budgets (M2, pinned runner)
